name: Update cpanfile.snapshot
on:
  schedule:
    - cron: '1 15 * * 0'
  workflow_dispatch:

permissions: {}

jobs:
  update-dep:
    runs-on: 'ubuntu-24.04'
    steps:
      - uses: docker/setup-buildx-action@v4
      - name: Generate Auth Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: haarg/setup-git-user@v2
        with:
          app: ${{ steps.app-token.outputs.app-slug }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Update cpanfile.snapshot
        run: |
          docker compose run --build --user root api-v0-shim-server bash -c 'rm -rf cpanfile.snapshot local/* && cpm install --with-develop --with-test && carton'
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: Update cpanfile.snapshot
          title: Update cpanfile.snapshot
          sign-commits: true
          body: |
            [GitHub Action Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          branch: update-cpanfile-snapshot
